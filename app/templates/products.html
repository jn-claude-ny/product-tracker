{% extends "base.html" %}

{% block title %}Products - Product Tracker{% endblock title %}

{% block content %}
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.4s ease-out; }
    .product-card { transition: all 0.3s ease; }
    .product-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
</style>

<div x-data="products()" x-init="init()" :class="darkMode ? 'dark' : ''">
    <div class="min-h-screen transition-colors duration-300" :class="darkMode ? 'bg-slate-900' : 'bg-gray-50'">
        <div class="px-4 py-8 sm:px-6 lg:px-8 max-w-7xl mx-auto">
            
            <!-- Header -->
            <div class="flex justify-between items-center mb-8 animate-fade-in">
                <div>
                    <h1 class="text-4xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">
                        Products
                    </h1>
                    <p class="mt-2 text-gray-600 dark:text-gray-400">Browse and search tracked products</p>
                </div>
                <div class="flex items-center space-x-4">
                    <button @click="darkMode = !darkMode; localStorage.setItem('darkMode', darkMode)" 
                            class="p-2 rounded-lg transition-colors duration-200"
                            :class="darkMode ? 'bg-slate-800 text-yellow-400' : 'bg-white text-gray-600'">
                        <svg x-show="!darkMode" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                        </svg>
                        <svg x-show="darkMode" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Search & Filters -->
            <div class="mb-6 space-y-4 animate-fade-in">
                <div class="flex flex-col md:flex-row gap-4">
                    <!-- Search Bar -->
                    <div class="flex-1 relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="w-5 h-5" :class="darkMode ? 'text-gray-400' : 'text-gray-500'" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                            </svg>
                        </div>
                        <input x-model="searchQuery" @input="search()" type="text" 
                               placeholder="Search products by title, brand, or description..." 
                               class="w-full pl-12 pr-4 py-3 rounded-xl border-2 transition-all duration-300 focus:outline-none focus:ring-2"
                               :class="darkMode ? 'bg-slate-800 border-slate-700 text-white placeholder-gray-400 focus:border-purple-500 focus:ring-purple-500/20' : 'bg-white border-gray-300 text-gray-900 placeholder-gray-500 focus:border-purple-600 focus:ring-purple-600/20'">
                    </div>
                    
                    <!-- Website Filter -->
                    <div class="relative">
                        <select x-model="websiteFilter" @change="search()"
                                class="appearance-none px-4 py-3 pr-10 rounded-xl border-2 transition-all duration-300 focus:outline-none focus:ring-2 cursor-pointer"
                                :class="darkMode ? 'bg-slate-800 border-slate-700 text-white focus:border-purple-500 focus:ring-purple-500/20' : 'bg-white border-gray-300 text-gray-900 focus:border-purple-600 focus:ring-purple-600/20'">
                            <option value="">All Websites</option>
                            <template x-for="site in websites" :key="site.id">
                                <option :value="site.id" x-text="site.name"></option>
                            </template>
                        </select>
                        <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none">
                            <svg class="w-5 h-5" :class="darkMode ? 'text-gray-400' : 'text-gray-500'" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3"/>
                            </svg>
                        </div>
                    </div>

                    <!-- Sort Dropdown -->
                    <div class="relative">
                        <select x-model="sortBy" @change="loadProducts()" 
                                class="appearance-none px-4 py-3 pr-10 rounded-xl border-2 transition-all duration-300 focus:outline-none focus:ring-2 cursor-pointer"
                                :class="darkMode ? 'bg-slate-800 border-slate-700 text-white focus:border-purple-500 focus:ring-purple-500/20' : 'bg-white border-gray-300 text-gray-900 focus:border-purple-600 focus:ring-purple-600/20'">
                            <option value="modified_desc">Recently Modified</option>
                            <option value="price_asc">Price: Low to High</option>
                            <option value="price_desc">Price: High to Low</option>
                            <option value="title_asc">Title: A-Z</option>
                            <option value="created_desc">Recently Added</option>
                        </select>
                        <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none">
                            <svg class="w-5 h-5" :class="darkMode ? 'text-gray-400' : 'text-gray-500'" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                            </svg>
                        </div>
                    </div>
                    
                    <!-- View Toggle -->
                    <div class="flex rounded-xl overflow-hidden border-2" :class="darkMode ? 'border-slate-700' : 'border-gray-300'">
                        <button @click="viewMode = 'grid'" 
                                class="px-4 py-3 transition-all duration-200"
                                :class="viewMode === 'grid' ? (darkMode ? 'bg-purple-600 text-white' : 'bg-purple-600 text-white') : (darkMode ? 'bg-slate-800 text-gray-400 hover:bg-slate-700' : 'bg-white text-gray-600 hover:bg-gray-50')">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
                            </svg>
                        </button>
                        <button @click="viewMode = 'list'" 
                                class="px-4 py-3 transition-all duration-200"
                                :class="viewMode === 'list' ? (darkMode ? 'bg-purple-600 text-white' : 'bg-purple-600 text-white') : (darkMode ? 'bg-slate-800 text-gray-400 hover:bg-slate-700' : 'bg-white text-gray-600 hover:bg-gray-50')">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 12h16M4 6h16M4 18h16"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Products Grid/List -->
            <div x-show="products.length > 0" class="animate-fade-in">
                <!-- Grid View -->
                <div x-show="viewMode === 'grid'" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <template x-for="product in products" :key="product.product_id">
                        <div class="product-card rounded-2xl overflow-hidden shadow-lg"
                             :class="darkMode ? 'bg-slate-800 border border-slate-700' : 'bg-white border border-gray-200'">
                            <!-- Product Image -->
                            <div class="relative h-56 bg-gradient-to-br from-purple-100 to-indigo-100 dark:from-slate-700 dark:to-slate-600">
                                <img x-show="product.image" :src="product.image" 
                                     class="w-full h-full object-contain p-4" 
                                     :alt="product.title">
                                <div x-show="!product.image" class="flex items-center justify-center h-full">
                                    <svg class="w-16 h-16 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                                    </svg>
                                </div>
                                                <!-- Status Badge -->
                                <div class="absolute top-3 right-3" x-show="product.status_badge">
                                    <span class="px-3 py-1 rounded-full text-xs font-bold backdrop-blur-sm shadow"
                                          :class="getStatusBadgeClass(product.status_badge)"
                                          x-text="product.status_badge"></span>
                                </div>
                            </div>
                            
                            <!-- Product Info -->
                            <div class="p-5">
                                <div class="mb-3">
                                    <h3 class="font-bold text-lg mb-1 line-clamp-2" 
                                        :class="darkMode ? 'text-white' : 'text-gray-900'"
                                        x-text="product.title"></h3>
                                    <p class="text-sm" 
                                       :class="darkMode ? 'text-gray-400' : 'text-gray-600'"
                                       x-text="product.brand || 'No brand'"></p>
                                </div>
                                
                                <!-- Price -->
                                <div class="mb-4">
                                    <p class="text-2xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent"
                                       x-text="(product.currency || '$') + ' ' + (product.price || 'N/A')"></p>
                                </div>
                                
                                <!-- Tracking Status -->
                                <div class="mb-3">
                                    <span x-show="product.is_tracked" class="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-200">
                                        <svg class="w-3 h-3 mr-1" fill="currentColor" viewBox="0 0 20 20">
                                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                                        </svg>
                                        Tracking
                                    </span>
                                </div>
                                
                                <!-- Action Buttons -->
                                <div class="flex gap-2">
                                    <button x-show="!product.is_tracked" @click="openTrackModal(product)" 
                                            class="flex-1 text-center py-2 px-3 rounded-xl font-semibold transition-all duration-200 transform hover:scale-105 bg-green-600 text-white hover:bg-green-700">
                                        <svg class="w-4 h-4 mr-1 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                                        </svg>
                                        Track
                                    </button>
                                    <button x-show="product.is_tracked" @click="editTracking(product)" 
                                            class="flex-1 text-center py-2 px-3 rounded-xl font-semibold transition-all duration-200 transform hover:scale-105 bg-blue-600 text-white hover:bg-blue-700">
                                        <svg class="w-4 h-4 mr-1 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                        </svg>
                                        Edit
                                    </button>
                                    <a :href="product.url" target="_blank" 
                                       class="flex-1 text-center py-2 px-3 rounded-xl font-semibold transition-all duration-200 transform hover:scale-105"
                                       :class="darkMode ? 'bg-purple-600 text-white hover:bg-purple-700' : 'bg-purple-600 text-white hover:bg-purple-700'">
                                        View
                                    </a>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
                
                <!-- List View -->
                <div x-show="viewMode === 'list'" class="space-y-4">
                    <template x-for="product in products" :key="product.product_id">
                        <div class="product-card rounded-2xl overflow-hidden shadow-lg"
                             :class="darkMode ? 'bg-slate-800 border border-slate-700' : 'bg-white border border-gray-200'">
                            <div class="flex flex-col md:flex-row">
                                <!-- Product Image -->
                                <div class="md:w-48 h-48 bg-gradient-to-br from-purple-100 to-indigo-100 dark:from-slate-700 dark:to-slate-600 flex-shrink-0">
                                    <img x-show="product.image" :src="product.image" 
                                         class="w-full h-full object-contain p-4" 
                                         :alt="product.title">
                                    <div x-show="!product.image" class="flex items-center justify-center h-full">
                                        <svg class="w-16 h-16 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                                        </svg>
                                    </div>
                                </div>
                                
                                <!-- Product Info -->
                                <div class="flex-1 p-6 flex flex-col justify-between">
                                    <div>
                                        <div class="flex items-start justify-between mb-2">
                                            <div class="flex-1">
                                                <h3 class="font-bold text-xl mb-1" 
                                                    :class="darkMode ? 'text-white' : 'text-gray-900'"
                                                    x-text="product.title"></h3>
                                                <p class="text-sm" 
                                                   :class="darkMode ? 'text-gray-400' : 'text-gray-600'"
                                                   x-text="product.brand || 'No brand'"></p>
                                            </div>
                                            <span x-show="product.status_badge" class="ml-4 px-3 py-1 rounded-full text-xs font-bold flex-shrink-0"
                                                  :class="getStatusBadgeClass(product.status_badge)"
                                                  x-text="product.status_badge"></span>
                                        </div>
                                    </div>
                                    
                                    <div class="flex items-center justify-between mt-4">
                                        <div>
                                            <p class="text-3xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent"
                                               x-text="(product.currency || '$') + ' ' + (product.price || 'N/A')"></p>
                                            <span x-show="product.is_tracked" class="inline-flex items-center mt-2 px-2 py-1 rounded-full text-xs font-medium bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-200">
                                                <svg class="w-3 h-3 mr-1" fill="currentColor" viewBox="0 0 20 20">
                                                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                                                </svg>
                                                Tracking
                                            </span>
                                        </div>
                                        <div class="flex gap-2">
                                            <button x-show="!product.is_tracked" @click="openTrackModal(product)" 
                                                    class="py-2 px-4 rounded-xl font-semibold transition-all duration-200 transform hover:scale-105 bg-green-600 text-white hover:bg-green-700">
                                                Track
                                            </button>
                                            <button x-show="product.is_tracked" @click="editTracking(product)" 
                                                    class="py-2 px-4 rounded-xl font-semibold transition-all duration-200 transform hover:scale-105 bg-blue-600 text-white hover:bg-blue-700">
                                                Edit
                                            </button>
                                            <a :href="product.url" target="_blank" 
                                               class="py-2 px-4 rounded-xl font-semibold transition-all duration-200 transform hover:scale-105"
                                               :class="darkMode ? 'bg-purple-600 text-white hover:bg-purple-700' : 'bg-purple-600 text-white hover:bg-purple-700'">
                                                View
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
            
            <!-- Empty State -->
            <div x-show="products.length === 0" class="text-center py-16 animate-fade-in">
                <svg class="mx-auto h-24 w-24 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
                </svg>
                <h3 class="mt-4 text-xl font-semibold" :class="darkMode ? 'text-gray-300' : 'text-gray-900'">No products found</h3>
                <p class="mt-2" :class="darkMode ? 'text-gray-400' : 'text-gray-600'">Try adjusting your search or filters</p>
            </div>

            <!-- Pagination -->
            <div x-show="totalPages > 1" class="mt-8 flex justify-between items-center animate-fade-in">
                <button @click="prevPage()" :disabled="page === 1" 
                        class="px-6 py-3 rounded-xl font-semibold transition-all duration-200 transform hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none"
                        :class="darkMode ? 'bg-slate-800 text-white hover:bg-slate-700' : 'bg-white text-gray-700 hover:bg-gray-50 border-2 border-gray-300'">
                    <div class="flex items-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                        </svg>
                        Previous
                    </div>
                </button>
                
                <div class="flex items-center space-x-2">
                    <span class="px-4 py-2 rounded-xl font-semibold" 
                          :class="darkMode ? 'bg-slate-800 text-white' : 'bg-white text-gray-700 border-2 border-gray-300'">
                        Page <span x-text="page"></span> of <span x-text="totalPages"></span>
                    </span>
                </div>
                
                <button @click="nextPage()" :disabled="page >= totalPages" 
                        class="px-6 py-3 rounded-xl font-semibold transition-all duration-200 transform hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none"
                        :class="darkMode ? 'bg-slate-800 text-white hover:bg-slate-700' : 'bg-white text-gray-700 hover:bg-gray-50 border-2 border-gray-300'">
                    <div class="flex items-center">
                        Next
                        <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                        </svg>
                    </div>
                </button>
            </div>
        </div>

        <!-- Track Product Modal -->
        <div x-show="trackModalOpen" class="fixed z-50 inset-0 overflow-y-auto" style="display: none;">
    <div class="flex items-center justify-center min-h-screen px-4">
        <div class="fixed inset-0 bg-black bg-opacity-50 backdrop-blur-sm transition-opacity" @click="trackModalOpen = false"></div>
        <div class="relative rounded-2xl overflow-hidden shadow-2xl transform transition-all max-w-lg w-full z-20 animate-slide-in"
             :class="darkMode ? 'bg-slate-800' : 'bg-white'">
            <div class="gradient-bg p-6">
                <h3 class="text-2xl font-bold text-white flex items-center">
                    <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                    Track Product
                </h3>
            </div>
            <div class="p-6">
                <div x-show="selectedProduct" class="mb-6 p-4 rounded-xl bg-gray-50 dark:bg-slate-700">
                    <div class="flex items-center space-x-3">
                        <img x-show="selectedProduct.image" :src="selectedProduct.image" 
                             :alt="selectedProduct.title" 
                             class="w-12 h-12 rounded-lg object-contain bg-white dark:bg-slate-600 p-2">
                        <div x-show="!selectedProduct.image" class="w-12 h-12 rounded-lg bg-gray-200 dark:bg-slate-600 flex items-center justify-center">
                            <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                            </svg>
                        </div>
                        <div class="flex-1">
                            <h4 class="font-semibold text-gray-900 dark:text-white truncate" x-text="selectedProduct.title"></h4>
                            <p class="text-sm text-gray-600 dark:text-gray-400" x-text="'$' + (selectedProduct.price || '0.00')"></p>
                        </div>
                    </div>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-2" :class="darkMode ? 'text-gray-300' : 'text-gray-700'">Priority</label>
                        <select x-model="trackForm.priority" 
                                class="w-full px-4 py-3 rounded-xl border-2 transition-colors duration-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                                :class="darkMode ? 'bg-slate-700 border-slate-600 text-white' : 'bg-white border-gray-300 text-gray-900'">
                            <option value="normal">Normal</option>
                            <option value="moderate">Moderate</option>
                            <option value="urgent">Urgent</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2" :class="darkMode ? 'text-gray-300' : 'text-gray-700'">Check Every (hours)</label>
                        <input x-model="trackForm.crawl_period_hours" type="number" min="1" max="168" 
                               class="w-full px-4 py-3 rounded-xl border-2 transition-colors duration-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                               :class="darkMode ? 'bg-slate-700 border-slate-600 text-white' : 'bg-white border-gray-300 text-gray-900'">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2" :class="darkMode ? 'text-gray-300' : 'text-gray-700'">Price Alert Condition (Optional)</label>
                        <div class="flex gap-2">
                            <select x-model="trackForm.price_condition" 
                                    class="flex-1 px-4 py-3 rounded-xl border-2 transition-colors duration-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                                    :class="darkMode ? 'bg-slate-700 border-slate-600 text-white' : 'bg-white border-gray-300 text-gray-900'">
                                <option value="">No alert</option>
                                <option value="greater_than">Price above</option>
                                <option value="less_than">Price below</option>
                                <option value="equal_to">Price equals</option>
                            </select>
                            <input x-model="trackForm.price_threshold" type="number" step="0.01" min="0" 
                                   x-show="trackForm.price_condition"
                                   placeholder="Amount"
                                   class="flex-1 px-4 py-3 rounded-xl border-2 transition-colors duration-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                                   :class="darkMode ? 'bg-slate-700 border-slate-600 text-white' : 'bg-white border-gray-300 text-gray-900'">
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2" :class="darkMode ? 'text-gray-300' : 'text-gray-700'">Discord Webhook URL (Optional)</label>
                        <input x-model="trackForm.discord_webhook_url" type="url" 
                               placeholder="https://discord.com/api/webhooks/..." 
                               class="w-full px-4 py-3 rounded-xl border-2 transition-colors duration-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                               :class="darkMode ? 'bg-slate-700 border-slate-600 text-white placeholder-gray-400' : 'bg-white border-gray-300 text-gray-900 placeholder-gray-500'">
                    </div>
                </div>
            </div>
            <div class="px-6 py-4 flex justify-end space-x-3" :class="darkMode ? 'bg-slate-900' : 'bg-gray-50'">
                <button @click="trackModalOpen = false" 
                        class="px-6 py-2 rounded-lg font-medium transition-all duration-200 transform hover:scale-105"
                        :class="darkMode ? 'bg-slate-700 text-gray-300 hover:bg-slate-600' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'">
                    Cancel
                </button>
                <button @click="trackProduct()" 
                        class="gradient-bg text-white px-6 py-2 rounded-lg font-medium shadow-lg hover:shadow-xl transform hover:scale-105 transition-all duration-200">
                    Start Tracking
                </button>
            </div>
        </div>
    </div>
    </div>
</div>

<script>
    function products() {
        return {
            products: [],
            websites: [],
            websiteFilter: '',
            searchQuery: '',
            sortBy: 'modified_desc',
            page: 1,
            totalPages: 1,
            viewMode: localStorage.getItem('productsViewMode') || 'grid',
            darkMode: localStorage.getItem('darkMode') === 'true',
            trackModalOpen: false,
            selectedProduct: null,
            trackForm: {
                priority: 'normal',
                crawl_period_hours: 24,
                price_condition: '',
                price_threshold: '',
                discord_webhook_url: ''
            },
            async init() {
                const token = localStorage.getItem('access_token');
                if (!token) {
                    window.location.href = '/login';
                    return;
                }
                await Promise.all([this.loadWebsites(), this.loadProducts()]);
            },
            async loadWebsites() {
                const token = localStorage.getItem('access_token');
                try {
                    const res = await fetch('/api/websites', { headers: { 'Authorization': 'Bearer ' + token } });
                    if (res.ok) this.websites = await res.json();
                } catch (e) { console.error('Failed to load websites', e); }
            },
            async loadProducts() {
                const token = localStorage.getItem('access_token');
                const params = new URLSearchParams({
                    q: this.searchQuery,
                    sort: this.sortBy,
                    page: this.page,
                    page_size: 20
                });
                if (this.websiteFilter) params.set('website_id', this.websiteFilter);
                const response = await fetch('/api/search?' + params, {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });
                if (response.ok) {
                    const data = await response.json();
                    this.products = data.results;
                    this.totalPages = data.pages;
                    
                    // Check which products are being tracked
                    await this.checkTrackingStatus();
                } else if (response.status === 401) {
                    localStorage.removeItem('access_token');
                    localStorage.removeItem('refresh_token');
                    window.location.href = '/login';
                }
            },
            async checkTrackingStatus() {
                const token = localStorage.getItem('access_token');
                try {
                    const response = await fetch('/api/tracked-products', {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    if (response.ok) {
                        const trackedProducts = await response.json();
                        const trackedIds = new Set(trackedProducts.map(tp => tp.product_id));
                        // Rebuild array so Alpine detects changes reactively
                        this.products = this.products.map(p => ({
                            ...p,
                            is_tracked: trackedIds.has(p.product_id)
                        }));
                    }
                } catch (error) {
                    console.error('Failed to check tracking status:', error);
                }
            },
            getStatusBadgeClass(badge) {
                if (badge === 'SALE') return 'bg-orange-500/90 text-white';
                if (badge === 'NEW') return 'bg-blue-500/90 text-white';
                if (badge === 'CLEARANCE') return 'bg-pink-500/90 text-white';
                if (badge === 'LIMITED') return 'bg-purple-500/90 text-white';
                if (badge === 'BACK') return 'bg-green-500/90 text-white';
                if (badge === 'OUT') return 'bg-red-500/90 text-white';
                return 'bg-gray-500/90 text-white';
            },
            openTrackModal(product) {
                this.selectedProduct = product;
                this.trackForm = {
                    priority: 'normal',
                    crawl_period_hours: 24,
                    price_condition: '',
                    price_threshold: '',
                    discord_webhook_url: ''
                };
                this.trackModalOpen = true;
                console.log('open log button')
            },
            async trackProduct() {
                const token = localStorage.getItem('access_token');
                try {
                    const response = await fetch('/api/tracked-products', {
                        method: 'POST',
                        headers: {
                            'Authorization': 'Bearer ' + token,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            product_id: this.selectedProduct.product_id,
                            priority: this.trackForm.priority,
                            crawl_period_hours: this.trackForm.crawl_period_hours,
                            price_condition: this.trackForm.price_condition || null,
                            price_threshold: this.trackForm.price_threshold || null,
                            discord_webhook_url: this.trackForm.discord_webhook_url || null
                        })
                    });
                    if (response.ok) {
                        this.trackModalOpen = false;
                        this.selectedProduct.is_tracked = true;
                        this.showNotification('✅ Product tracking started!', 'success');
                    } else {
                        const error = await response.json();
                        const errorMsg = typeof error.error === 'object' 
                            ? JSON.stringify(error.error) 
                            : (error.error || 'Unknown error');
                        this.showNotification('❌ Failed to track product: ' + errorMsg, 'error');
                    }
                } catch (error) {
                    console.error('Failed to track product:', error);
                    this.showNotification('❌ Failed to track product', 'error');
                }
            },
            editTracking(product) {
                // TODO: Implement edit tracking modal
                console.log('Edit tracking for:', product);
            },
            showNotification(message, type = 'info') {
                // Simple notification implementation
                const notification = document.createElement('div');
                notification.className = `fixed top-4 right-4 z-50 p-4 rounded-lg shadow-lg transform transition-all duration-300 ${
                    type === 'success' ? 'bg-green-500 text-white' : 
                    type === 'error' ? 'bg-red-500 text-white' : 
                    'bg-blue-500 text-white'
                }`;
                notification.textContent = message;
                document.body.appendChild(notification);
                
                setTimeout(() => {
                    notification.style.opacity = '0';
                    setTimeout(() => notification.remove(), 300);
                }, 3000);
            },
            async search() {
                this.page = 1;
                await this.loadProducts();
            },
            async prevPage() {
                if (this.page > 1) {
                    this.page--;
                    await this.loadProducts();
                }
            },
            async nextPage() {
                if (this.page < this.totalPages) {
                    this.page++;
                    await this.loadProducts();
                }
            }
        }
    }
</script>
{% endblock content %}
