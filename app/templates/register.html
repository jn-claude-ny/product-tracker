<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Register for Product Tracker - Start monitoring product prices">
    <meta name="keywords" content="product tracker, price monitoring, register, sign up">
    <title>Register - Product Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.13.3/dist/cdn.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .gradient-animated {
            background: linear-gradient(-45deg, #667eea, #764ba2, #f093fb, #4facfe);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.6s ease-out; }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .dark .glass-effect {
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .dark { background-color: #0f172a; }
        .input-focus:focus {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }
    </style>
</head>
<body class="gradient-animated min-h-screen" x-data="{ darkMode: localStorage.getItem('darkMode') === 'true' }" :class="darkMode ? 'dark' : ''">
    <!-- Dark Mode Toggle -->
    <div class="absolute top-6 right-6 z-50 animate-fade-in">
        <button @click="darkMode = !darkMode; localStorage.setItem('darkMode', darkMode)" 
                class="p-3 rounded-full glass-effect shadow-lg hover:shadow-xl transform hover:scale-110 transition-all duration-300">
            <svg x-show="!darkMode" class="w-6 h-6 text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
            </svg>
            <svg x-show="darkMode" class="w-6 h-6 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
            </svg>
        </button>
    </div>

    <div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full space-y-8 animate-fade-in">
            <!-- Logo & Title -->
            <div class="text-center">
                <div class="mx-auto w-20 h-20 gradient-bg rounded-2xl flex items-center justify-center shadow-2xl mb-6 animate-float">
                    <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                </div>
                <h2 class="text-4xl font-extrabold" :class="darkMode ? 'text-white' : 'text-white'">
                    Create Account
                </h2>
                <p class="mt-3 text-lg" :class="darkMode ? 'text-gray-300' : 'text-white/90'">
                    Join us and start tracking products
                </p>
            </div>

            <!-- Register Form -->
            <div x-data="registerForm()" class="glass-effect rounded-2xl shadow-2xl p-8 space-y-6">
                <!-- Email Input -->
                <div>
                    <label class="block text-sm font-semibold mb-2" :class="darkMode ? 'text-gray-200' : 'text-gray-700'">
                        Email Address
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="w-5 h-5" :class="darkMode ? 'text-gray-400' : 'text-gray-500'" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/>
                            </svg>
                        </div>
                        <input x-model="email" type="email" required
                               class="input-focus w-full pl-12 pr-4 py-3 rounded-xl border-2 transition-all duration-300 focus:outline-none"
                               :class="darkMode ? 'bg-slate-700 border-slate-600 text-white placeholder-gray-400 focus:border-purple-500' : 'bg-white border-gray-300 text-gray-900 placeholder-gray-500 focus:border-purple-600'"
                               placeholder="you@example.com">
                    </div>
                </div>

                <!-- Password Input -->
                <div>
                    <label class="block text-sm font-semibold mb-2" :class="darkMode ? 'text-gray-200' : 'text-gray-700'">
                        Password
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="w-5 h-5" :class="darkMode ? 'text-gray-400' : 'text-gray-500'" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                            </svg>
                        </div>
                        <input x-model="password" type="password" required
                               class="input-focus w-full pl-12 pr-4 py-3 rounded-xl border-2 transition-all duration-300 focus:outline-none"
                               :class="darkMode ? 'bg-slate-700 border-slate-600 text-white placeholder-gray-400 focus:border-purple-500' : 'bg-white border-gray-300 text-gray-900 placeholder-gray-500 focus:border-purple-600'"
                               placeholder="Min 8 characters">
                    </div>
                    <p class="mt-2 text-xs" :class="darkMode ? 'text-gray-400' : 'text-gray-600'">
                        Must be at least 8 characters long
                    </p>
                </div>

                <!-- Error Message -->
                <div x-show="error" x-transition class="rounded-xl bg-red-500/10 border-2 border-red-500 p-4">
                    <div class="flex items-center">
                        <svg class="w-5 h-5 text-red-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                        <p class="text-sm font-medium text-red-500" x-text="error"></p>
                    </div>
                </div>

                <!-- Success Message -->
                <div x-show="success" x-transition class="rounded-xl bg-green-500/10 border-2 border-green-500 p-4">
                    <div class="flex items-center">
                        <svg class="w-5 h-5 text-green-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                        <p class="text-sm font-medium text-green-500">Account created! Redirecting...</p>
                    </div>
                </div>

                <!-- Register Button -->
                <button @click="register()" type="button" :disabled="loading"
                        class="w-full gradient-bg text-white py-3 px-6 rounded-xl font-semibold text-lg shadow-lg hover:shadow-2xl transform hover:scale-105 transition-all duration-300 focus:outline-none focus:ring-4 focus:ring-purple-500/50 disabled:opacity-50 disabled:cursor-not-allowed">
                    <span x-show="!loading">Create Account</span>
                    <span x-show="loading" class="flex items-center justify-center">
                        <svg class="animate-spin h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        Creating account...
                    </span>
                </button>

                <!-- Divider -->
                <div class="relative">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t" :class="darkMode ? 'border-gray-600' : 'border-gray-300'"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-4 text-gray-500" :class="darkMode ? 'bg-slate-800' : 'bg-white'">
                            Already have an account?
                        </span>
                    </div>
                </div>

                <!-- Login Link -->
                <a href="{{ url_for('auth.login') }}" class="block text-center py-3 px-6 rounded-xl font-semibold border-2 transition-all duration-300 transform hover:scale-105"
                   :class="darkMode ? 'border-purple-500 text-purple-400 hover:bg-purple-500/10' : 'border-purple-600 text-purple-600 hover:bg-purple-50'">
                    Sign In Instead
                </a>
            </div>

            <!-- Features -->
            <div class="grid grid-cols-3 gap-4 mt-8">
                <div class="text-center">
                    <div class="glass-effect rounded-xl p-4 shadow-lg">
                        <svg class="w-8 h-8 mx-auto mb-2" :class="darkMode ? 'text-purple-400' : 'text-purple-600'" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                        <p class="text-xs font-semibold" :class="darkMode ? 'text-gray-300' : 'text-gray-700'">Fast</p>
                    </div>
                </div>
                <div class="text-center">
                    <div class="glass-effect rounded-xl p-4 shadow-lg">
                        <svg class="w-8 h-8 mx-auto mb-2" :class="darkMode ? 'text-purple-400' : 'text-purple-600'" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                        </svg>
                        <p class="text-xs font-semibold" :class="darkMode ? 'text-gray-300' : 'text-gray-700'">Secure</p>
                    </div>
                </div>
                <div class="text-center">
                    <div class="glass-effect rounded-xl p-4 shadow-lg">
                        <svg class="w-8 h-8 mx-auto mb-2" :class="darkMode ? 'text-purple-400' : 'text-purple-600'" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                        <p class="text-xs font-semibold" :class="darkMode ? 'text-gray-300' : 'text-gray-700'">Simple</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function registerForm() {
            return {
                email: '',
                password: '',
                error: '',
                success: false,
                loading: false,
                async register() {
                    if (this.loading) return;
                    
                    this.error = '';
                    this.success = false;
                    
                    if (!this.email || !this.password) {
                        this.error = 'Please fill in all fields';
                        return;
                    }
                    
                    if (this.password.length < 8) {
                        this.error = 'Password must be at least 8 characters';
                        return;
                    }
                    
                    this.loading = true;
                    
                    try {
                        const response = await fetch('/api/auth/register', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                email: this.email,
                                password: this.password
                            })
                        });

                        const data = await response.json();

                        if (response.ok) {
                            this.success = true;
                            localStorage.setItem('access_token', data.access_token);
                            localStorage.setItem('refresh_token', data.refresh_token);
                            setTimeout(() => {
                                window.location.href = '/dashboard';
                            }, 1500);
                        } else {
                            this.error = data.error || 'Registration failed';
                            this.loading = false;
                        }
                    } catch (e) {
                        this.error = 'Network error. Please try again.';
                        this.loading = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
